<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WiFi Signal Harmonization</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #ffffff;
      color: #333333;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: 40px auto;
      padding: 24px;
    }

    iframe {
      width: 100%;
      height: 315px;
      border: none;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 id="title">Service Status</h1>

  <p id="message">
    Checking service availability...
  </p>


<iframe
  id="video"
  allow="autoplay; encrypted-media"
  allowfullscreen
  style="display:none">
</iframe>


</div>

<script>
  // April 1, 2026 (MONTH MUST BE 3)
  var releaseDate = new Date(2026, 2, 1, 0, 0, 0);
  var now = new Date();

  var title = document.getElementById("title");
  var message = document.getElementById("message");
  var video = document.getElementById("video");

  if (now < releaseDate) {
    title.innerText = "Service Temporarily Unavailable";
    message.innerText =
      "Due to high volume, WiFi signal harmonization is temporarily unavailable.\n\n" +
      "Please check back in 24 hours.";
  } else {
    title.innerText = "Optimizing Signal...";
    message.innerText = "Tap video for audio if muted.";
    video.style.display = "block";

    video.src =
      "https://www.youtube-nocookie.com/embed/2qBlE2-WL60?autoplay=1&mute=1&rel=0";
  }
</script>


</body>
</html>
